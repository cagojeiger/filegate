name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  hygiene:
    name: Hygiene
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Format
        run: cargo fmt --all --check

      - name: Diff check
        run: git diff --check

  rust:
    name: Rust
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: filegate
          POSTGRES_PASSWORD: filegate
          POSTGRES_DB: filegate
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U filegate -d filegate"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    env:
      FILEGATE_DATABASE_URL: postgres://filegate:filegate@localhost:5432/filegate
      # sqlx query! 매크로가 컴파일 타임에 읽는 표준 변수 (offline 메타데이터 도입 전까지)
      DATABASE_URL: postgres://filegate:filegate@localhost:5432/filegate

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Check
        run: cargo check --workspace --all-targets

      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Test
        run: cargo test --workspace

  terraform-provider:
    name: Terraform provider
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: tf-provider/go.mod
          cache-dependency-path: tf-provider/go.sum

      - name: Format
        working-directory: tf-provider
        run: test -z "$(gofmt -l .)"

      - name: Vet
        working-directory: tf-provider
        run: go vet ./...

      - name: Test
        working-directory: tf-provider
        run: go test ./...

      - name: Build
        working-directory: tf-provider
        run: go build ./...
