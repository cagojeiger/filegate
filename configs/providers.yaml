# provider 정의(연결 계약) — 벤더 자격증명이 있는 유일한 파일.
# 배포에서는 ESO(External Secrets Operator)가 이 파일을 k8s Secret으로
# 동기화해 마운트한다. 아래 값은 로컬 docker-compose 전용.
# provider 상태(위치·용량 사용량)는 DB에 산다 (ADR 004).
providers:
  minio-local:
    endpoint: "http://127.0.0.1:9000"
    region: us-east-1
    access_key: filegate
    secret_key: filegate-secret
    bucket: filegate-std
    force_path_style: true
