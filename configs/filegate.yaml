# 로컬 개발 설정. 프로덕션은 이 파일을 커밋하지 말고 별도로 마운트한다
# (FILEGATE_CONFIG로 경로 지정). 여기 자격증명은 로컬 docker-compose 전용.
server:
  bind_addr: "127.0.0.1:8080"
  log_format: pretty # pretty | json

database:
  url: "postgres://filegate:filegate@127.0.0.1:55432/filegate"
  max_connections: 5

# provider 정의(연결 계약). 상태(위치·용량)는 DB에 산다.
providers:
  minio-local:
    endpoint: "http://127.0.0.1:9000"
    region: us-east-1
    access_key: filegate
    secret_key: filegate-secret
    bucket: filegate-std
    force_path_style: true

# 배치 카탈로그 (운영자 결정). providers는 후보 풀 — 하나면 pin과 같다.
storage_profiles:
  std:
    providers: [minio-local]

# 서비스 등록. 키는 sha256 해시로만 선언한다 (raw 키는 서비스가 보관).
# 아래는 로컬 예시 — raw key: local-dev-key-001. 운영에는 그대로 쓰지 않는다.
clients:
  example-service:
    key_hashes:
      - sha256:6fdbd96019f1a7da41d41bee1262b9538d6f79a6fae129c4d1c4abca18e06ce2
    intents:
      avatar: std
