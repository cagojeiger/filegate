# 로컬 개발 환경: MinIO(직결 provider) + PostgreSQL(메타데이터 저장소).
services:
  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z # 마지막 AGPL 커뮤니티 릴리스 (docs/vendors/minio.md)
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: filegate
      MINIO_ROOT_PASSWORD: filegate-secret
    ports:
      - "127.0.0.1:9000:9000"
      - "127.0.0.1:9001:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 3s
      retries: 10
    volumes:
      - minio-data:/data

  # 버킷 프로비저닝은 운영자 몫이다 — filegate는 버킷을 만들지 않는다.
  # 로컬에선 이 일회성 잡이 그 역할을 대신해 filegate-std 버킷을 만든다.
  createbuckets:
    image: minio/mc:RELEASE.2025-08-13T08-35-41Z
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 filegate filegate-secret &&
      mc mb --ignore-existing local/filegate-std
      "

  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: filegate
      POSTGRES_PASSWORD: filegate
      POSTGRES_DB: filegate
    ports:
      - "127.0.0.1:55432:5432"
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "filegate", "-d", "filegate"]
      interval: 5s
      timeout: 3s
      retries: 10
    volumes:
      - pg-data:/var/lib/postgresql/data

volumes:
  minio-data:
  pg-data:
