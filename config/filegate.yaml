# filegate runtime configuration.
# secrets are never written here — every credential is an env var reference.
# invalid config (dangling references, missing envs) is a boot failure.

listen_addr: "127.0.0.1:8086"

providers:
  minio-local:
    # address filegate itself uses for verification / deletion
    endpoint: "http://localhost:9000"
    # address baked into presigned URLs handed to clients
    public_endpoint: "http://localhost:9000"
    region: "us-east-1"
    access_key_env: "FILEGATE_MINIO_ACCESS_KEY"
    secret_key_env: "FILEGATE_MINIO_SECRET_KEY"
    force_path_style: true

clients:
  notegate:
    api_key_env: "FILEGATE_CLIENT_NOTEGATE_KEY"
    allowed_intents:
      - note_attachment
      - temporary_upload

intents:
  note_attachment:
    provider: minio-local
    bucket: filegate-std
    max_file_size_bytes: 104857600 # 100 MiB
    write_lease_ttl_secs: 600
    read_lease_ttl_secs: 300
    retention_after_detach_secs: 86400 # 1 day before purge
  temporary_upload:
    provider: minio-local
    bucket: filegate-std
    max_file_size_bytes: 10485760 # 10 MiB
    write_lease_ttl_secs: 300
    read_lease_ttl_secs: 300
    retention_after_detach_secs: 0 # purge on next reconcile

quotas:
  notegate:
    max_total_bytes: 5368709120 # 5 GiB
